<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Canvas Composer</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div id="app-container">
        <!-- Toolbar Top -->
        <div class="toolbar top">
            <button id="btn-download" class="btn primary">Download</button>
            <div class="spacer"></div>
            <label class="btn icon-btn">
                <span>Add Image</span>
                <input type="file" id="file-input" accept="image/*" multiple hidden>
            </label>
        </div>

        <!-- Workspace (Canvas Area) -->
        <div id="workspace">
            <div id="canvas-wrapper">
                <canvas id="main-canvas"></canvas>
            </div>
        </div>

        <!-- Toolbar Bottom (Settings) -->
        <div class="toolbar bottom">
            <div class="control-group">
                <label>Dimensions</label>
                <div class="inputs">
                    <input type="number" id="inp-width" value="1080">
                    <span>x</span>
                    <input type="number" id="inp-height" value="1080">
                </div>
            </div>
            <div class="control-group">
                <label>Background</label>
                <input type="color" id="inp-bg-color" value="#ffffff">
            </div>
            <div class="control-group" id="selection-controls" style="display:none; opacity: 0.5;">
                <label>Selected</label>
                <button id="btn-delete" class="btn danger">Delete</button>
            </div>
        </div>
    </div>

    <!-- Import Map for modularity -->
    <script type="importmap">
        {
            "imports": {
                "app": "./main.js"
            }
        }
    </script>
    <script type="module" src="main.js"></script>

</body>
</html>
